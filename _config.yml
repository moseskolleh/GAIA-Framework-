# GitHub Pages Configuration for GAIA Framework 2.0
# (Inert while .nojekyll is present; kept accurate for tooling that reads it.)

title: "GAIA Framework 2.0"
description: "Green AI Assessment - a science-based framework for measuring, judging, and reducing the environmental footprint of AI use"
author: "GAIA Framework"
baseurl: "" # Leave empty for root deployment
url: "https://moseskolleh.github.io/GAIA-Framework-"

# Theme settings
theme: null # Custom single-file HTML, no Jekyll theme

# Build settings
markdown: kramdown

# Exclude files from processing
exclude:
  - README.md
  - LICENSE
  - .gitignore
  - build_workbook.py
  - data/
  - legacy/

# Include specific files
include:
  - .nojekyll

# SEO settings
lang: en_US
logo: null

# Default front matter
defaults:
  - scope:
      path: ""
    values:
      layout: null
